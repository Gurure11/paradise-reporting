<!DOCTYPE html>
<html>
<head>
  <title>OnPoint Fuel Reconciliation</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>

<h1>OnPoint Fuel Reconciliation Dashboard</h1>

<button onclick="downloadPDF()">Download PDF Report</button>
<button onclick="downloadExcel()">Download Excel Report</button>

<canvas id="pieChart"></canvas>
<canvas id="barChart"></canvas>

<table id="fuelTable" border="1">
<thead>
<tr>
<th>Date</th><th>Driver</th><th>Vehicle</th>
<th>ER</th><th>Fuel</th><th>Status</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script>
async function loadData() {
  let res = await fetch("https://script.google.com/macros/s/AKfycby05f_pnES1a_r0RdNZ9QWKkffDUSFYpZaKy5bFgimOwrUseWs0joiVFy8GABia0TQ9eg/exec");
  let data = await res.json();

  let table = document.querySelector("#fuelTable tbody");
  table.innerHTML = "";

  let matched=0, unmatched=0;

  data.fuelLog.forEach(r => {
    if(r.status.includes("Matched")) matched++; else unmatched++;

    let tr = `<tr>
    <td>${r.date}</td>
    <td>${r.driver}</td>
    <td>${r.vehicle}</td>
    <td>${r.er}</td>
    <td>${r.total}</td>
    <td>${r.status}</td>
    </tr>`;
    table.innerHTML += tr;
  });

  new Chart(document.getElementById("pieChart"), {
    type:'pie',
    data:{labels:["Matched","Unmatched"],datasets:[{data:[matched,unmatched]}]}
  });
}

function downloadPDF(){
  const { jsPDF } = window.jspdf;
  let doc = new jsPDF();
  doc.text(document.body.innerText,10,10);
  doc.save("Fuel_Report.pdf");
}

function downloadExcel(){
  let table=document.getElementById("fuelTable");
  let wb=XLSX.utils.table_to_book(table);
  XLSX.writeFile(wb,"Fuel_Report.xlsx");
}

loadData();
</script>

</body>
</html>
